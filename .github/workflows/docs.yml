# Build the Doxygen API reference and publish it to GitHub Pages.
#
# One-time setup (repo owner): Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". Until that's set, this workflow builds fine but the
# deploy step has nowhere to publish.
name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege + the OIDC token the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight Pages deploy; let queued runs serialise.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen
      - name: Build the API reference
        # Same checked-in Doxyfile the local `docs` target uses; output → docs/html.
        run: |
          doxygen --version
          doxygen Doxyfile
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/html
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
