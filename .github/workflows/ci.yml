name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.cc }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Configure (ASan + UBSan)
        run: >
          cmake -B build-san -G Ninja
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
      - name: Build
        run: cmake --build build-san
      - name: Test
        run: ctest --test-dir build-san --output-on-failure

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: >
          clang-format --dry-run --Werror
          lib/src/pio_sim.c lib/include/pio_sim.h
          lib/src/pio_asm.c lib/include/pio_asm.h
          tests/test_pio_sim.c tests/test_pio_asm.c
