name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# One run per ref: a push on top of an in-flight run (or a same-repo PR
# doubling a branch push) cancels the stale jobs instead of stacking 9 more.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # a gcc failure shouldn't hide the clang result (and vice versa)
      matrix:
        cc: [gcc, clang-21]
        platform: [RP2350, RP2040]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install toolchain
        # clang-21 is the pinned clang everywhere (matches the flake dev shell);
        # apt.llvm.org's llvm.sh installs it on whatever the runner's distro is.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lsb-release wget gnupg
          if [ "${{ matrix.cc }}" = "clang-21" ]; then
            wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
            sudo bash /tmp/llvm.sh 21
          fi
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.cc }} -DPIO_SIM_PLATFORM=${{ matrix.platform }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [RP2350, RP2040] # exercise the v0-gated paths under ASan/UBSan too
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lsb-release wget gnupg
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 21
      - name: Configure (ASan + UBSan)
        # Clang's ASan/UBSan give the most actionable diagnostics; pin clang-21.
        run: >
          cmake -B build-san -G Ninja
          -DCMAKE_C_COMPILER=clang-21
          -DPIO_SIM_PLATFORM=${{ matrix.platform }}
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
      - name: Build
        run: cmake --build build-san
      - name: Test
        run: ctest --test-dir build-san --output-on-failure

  # Encoding differential: cross-check pio_asm against the authoritative
  # Raspberry Pi pioasm, built from the pinned Pico SDK. Gates that the
  # in-tree assembler's instruction encodings stay bit-exact.
  differential:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [RP2350, RP2040]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++ bison flex
      - name: Checkout pinned Pico SDK (for pioasm)
        uses: actions/checkout@v7
        with:
          repository: raspberrypi/pico-sdk
          ref: '2.1.0'
          path: pico-sdk
      - name: Build pioasm
        # bison/flex regenerate the parser to match the source; -include cstdint
        # keeps the SDK 2.1.0 sources compiling on newer GCC/libstdc++.
        run: |
          cmake -S pico-sdk/tools/pioasm -B build-pioasm -G Ninja \
            -DCMAKE_CXX_FLAGS="-include cstdint"
          cmake --build build-pioasm
      - name: Configure (with pioasm)
        run: >
          cmake -B build -G Ninja -DPIOASM_EXECUTABLE="$PWD/build-pioasm/pioasm"
          -DPIO_SIM_PLATFORM=${{ matrix.platform }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Static analysis: clang-tidy over the library sources. Compile flags and the
  # per-platform feature defines come from CMake's compile_commands.json, so the
  # gated v0/v1 surface is analysed exactly as built. Checks + WarningsAsErrors
  # live in .clang-tidy.
  clang-tidy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [RP2350, RP2040]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install toolchain
        # Pin clang-tidy 21 (matches the flake dev shell, so local runs and CI
        # agree). `llvm.sh 21 all` pulls in clang-tidy-21.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lsb-release wget gnupg
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 21 all
      - name: Configure (export compile_commands.json)
        run: >
          cmake -B build -G Ninja
          -DPIO_SIM_PLATFORM=${{ matrix.platform }}
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on the library
        run: >
          clang-tidy-21 -p build lib/src/pio_sim.c lib/src/pio_gpio.c lib/src/pio_clock.c
          lib/src/pio_dma.c lib/src/pio_chip.c lib/src/pio_asm.c

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format
        # clang-format 21, matching the flake dev shell and the rest of CI.
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget gnupg
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 21 all
      - name: Check formatting
        run: >
          clang-format-21 --dry-run --Werror
          lib/src/pio_sim.c lib/include/pio_sim.h
          lib/src/pio_dma.c lib/include/pio_dma.h lib/src/pio_sim_internal.h
          lib/src/pio_gpio.c lib/include/pio_gpio.h
          lib/src/pio_clock.c lib/include/pio_clock.h
          lib/src/pio_chip.c lib/include/pio_chip.h
          lib/src/pio_asm.c lib/include/pio_asm.h
          lib/config/pio_sim_config.h
          tests/test_pio_sim.c tests/test_pio_asm.c
          tests/test_pio_gpio.c tests/test_pio_clock.c tests/test_pio_dma.c
          tests/test_pio_programs.c tests/fuzz_pio_asm.c
          tests/test_pio_asm_vs_pioasm.c

  # Fuzz the assembler's untrusted-text entry point under ASan+UBSan for a
  # short smoke each PR. Fails only if libFuzzer finds a crash/UB (which is
  # the point). The library sources are instrumented into the harness.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lsb-release wget gnupg
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 21
      - name: Build the fuzzer
        run: >
          cmake -B build-fuzz -G Ninja -DCMAKE_C_COMPILER=clang-21
          -DPIO_SIM_PLATFORM=RP2350 -DPIO_SIM_BUILD_FUZZERS=ON
          && cmake --build build-fuzz --target fuzz_pio_asm
      - name: Fuzz (60s smoke)
        # First dir is where libFuzzer writes new finds (scratch); the seed
        # corpus is read-only input, so it stays pristine.
        run: |
          mkdir -p /tmp/fuzz-finds
          ./build-fuzz/tests/fuzz_pio_asm -max_total_time=60 /tmp/fuzz-finds tests/fuzz_corpus

  # Source coverage (llvm-cov) over the library, merging the RP2040 and RP2350
  # test runs so v0- and v1-gated code both count. Fails under an 80% line-
  # coverage gate; the full HTML report is uploaded as an artifact.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lsb-release wget gnupg jq
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 21 all
      - name: Build and run with coverage (both platforms)
        run: |
          mkdir -p prof
          for plat in RP2040 RP2350; do
            cmake -B "build-$plat" -G Ninja -DCMAKE_C_COMPILER=clang-21 \
              -DPIO_SIM_PLATFORM="$plat" -DPIO_SIM_COVERAGE=ON
            cmake --build "build-$plat"
            ( cd "build-$plat" && LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/prof/$plat-%p.profraw" \
              ctest --output-on-failure )
          done
      - name: Report, gate at 80%, and render HTML
        run: |
          llvm-profdata-21 merge -sparse prof/*.profraw -o merged.profdata
          OBJS=$(find build-RP2040 build-RP2350 -type f -name 'test_pio_*' \
            ! -name '*.profraw' | sed 's/^/-object /' | tr '\n' ' ')
          IGNORE='(tests|third_party|unity)'
          # shellcheck disable=SC2086
          llvm-cov-21 report $OBJS -instr-profile=merged.profdata \
            -ignore-filename-regex="$IGNORE" | tee coverage.txt
          {
            echo '### Coverage — lib/src, RP2040 + RP2350 merged'
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # shellcheck disable=SC2086
          PCT=$(llvm-cov-21 export $OBJS -instr-profile=merged.profdata -summary-only \
            -ignore-filename-regex="$IGNORE" | jq '.data[0].totals.lines.percent')
          echo "Total line coverage: $PCT%"
          awk -v p="$PCT" 'BEGIN { if (p+0 < 80) { print "FAIL: below the 80% gate"; exit 1 }
            print "PASS: at or above the 80% gate" }'
          # shellcheck disable=SC2086
          llvm-cov-21 show $OBJS -instr-profile=merged.profdata -format=html \
            -ignore-filename-regex="$IGNORE" -output-dir=coverage-html
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html
